<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Eng. Allan</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("v-m77E7p5O_T16kX_");</script>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; --slate: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--slate); display: flex; }
        .sidebar { width: 260px; background: var(--navy); color: white; padding: 30px; position: fixed; height: 100vh; border-right: 4px solid var(--gold); }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-post { background: var(--navy); color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-post:hover { background: var(--gold); color: var(--navy); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #eee; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-del { background: #ff4d4f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--gold)">BIONEX</h2>
    <p>Founder & CEO:<br><strong>Eng. Allan</strong></p>
    <hr style="opacity:0.2; margin: 20px 0;">
    <p>● System Administrator</p>
</div>

<div class="main">
    <h1>Executive Control Room</h1>
    
    <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:30px;">
        <div class="card">
            <h3>Post Vacancy</h3>
            <form id="jobForm">
                <label>TITLE</label>
                <input type="text" name="TITLE" placeholder="e.g. Biomedical Engineer" required>
                <label>DESCRIPTION</label>
                <textarea name="DESCRIPTION" rows="3" placeholder="Job details..."></textarea>
                <label>QUESTIONS (Comma separated)</label>
                <textarea name="QUESTIONS" rows="3" placeholder="Q1, Q2, Q3..."></textarea>
                <label>ATTACHMENTREQUIRED</label>
                <select name="ATTACHMENTREQUIRED">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
                <button type="submit" id="pBtn" class="btn-post">PUBLISH JOB</button>
            </form>
            <hr>
            <h4>Current Jobs</h4>
            <div id="jobListDisplay"></div>
        </div>

        <div class="card">
            <h3>Recent Applicants</h3>
            <table>
                <thead>
                    <tr><th>CANDIDATE</th><th>POSITION</th><th>ACTION</th></tr>
                </thead>
                <tbody id="applicantList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    document.getElementById("jobForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("pBtn").innerText = "Publishing...";
        await fetch(API_URL, { method: "POST", body: new FormData(e.target) });
        alert("Published!");
        location.reload();
    });

    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        // Jobs
        const jobs = data.filter(r => r.TITLE);
        document.getElementById("jobListDisplay").innerHTML = jobs.map(j => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f9f9f9; padding:8px; border-radius:5px;">
                <small>${j.TITLE}</small>
                <button class="btn-del" onclick="deleteJob('${j.TITLE}')">Delete</button>
            </div>
        `).join('');

        // Applicants
        const apps = data.filter(r => r.JINA);
        document.getElementById("applicantList").innerHTML = apps.map(u => `
            <tr>
                <td><strong>${u.JINA}</strong><br><small>${u.EMAIL}</small></td>
                <td>${u.NAFASI}</td>
                <td>
                    <button style="color:green; border:none; background:none; cursor:pointer;" onclick="respond('${u.EMAIL}','${u.JINA}','accept')">✔</button>
                    <button style="color:red; border:none; background:none; cursor:pointer;" onclick="respond('${u.EMAIL}','${u.JINA}','reject')">✖</button>
                </td>
            </tr>
        `).join('');
    }

    async function deleteJob(title) {
        if(confirm("Delete this job?")) {
            await fetch(`${API_URL}/TITLE/${title}`, { method: "DELETE" });
            location.reload();
        }
    }

    window.respond = (email, name, type) => {
        const tid = type === 'accept' ? "template_3w0v7dr" : "template_rej123";
        emailjs.send("service_69b8y3p", tid, { to_email: email, to_name: name })
        .then(() => alert("Email Sent!"));
    };

    loadData();
</script>
</body>
</html>
