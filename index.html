<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Enterprise Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("v-m77E7p5O_T16kX_");</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a192f; --secondary: #112240; --accent: #ffca28; --text: #ccd6f6; --white: #ffffff; --success: #52c41a; --danger: #ff4d4f; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f4f7fb; display: flex; color: var(--primary); }
        
        /* Sidebar Navigation */
        .sidebar { width: 300px; background: var(--primary); color: white; padding: 40px 25px; position: fixed; height: 100vh; border-right: 5px solid var(--accent); box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 1.8rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; }
        .sidebar p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 40px; }
        .nav-item { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 15px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; }
        .nav-item.active { border-left-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        /* Main Workspace */
        .main { margin-left: 300px; flex: 1; padding: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .welcome-text h2 { margin: 0; font-size: 2rem; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1.6fr; gap: 40px; }
        .card { background: var(--white); padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        /* Forms */
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: #555; }
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #e0e6ed; background: #fcfdfe; font-size: 0.95rem; transition: 0.3s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; background: white; box-shadow: 0 0 0 4px rgba(255, 202, 40, 0.1); }
        
        .btn-primary { background: var(--primary); color: var(--accent); border: 2px solid var(--accent); width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary:hover { background: var(--accent); color: var(--primary); transform: translateY(-2px); }

        /* Tables & Lists */
        .job-pill { background: #f1f4f9; padding: 12px 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eef1f6; }
        .delete-icon { color: var(--danger); cursor: pointer; font-weight: bold; border: 1px solid var(--danger); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 18px; border-bottom: 2px solid #f1f4f9; color: #8892b0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px; border-bottom: 1px solid #f1f4f9; font-size: 0.9rem; }
        
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; color: white; font-weight: bold; margin-right: 5px; transition: 0.2s; }
        .btn-circle:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>BIONEX</h1>
    <p>MANAGEMENT SYSTEM v2.0</p>
    
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Active Vacancies</div>
    <div class="nav-item">Archive</div>
    
    <div style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <span style="font-size: 0.8rem; opacity: 0.6;">CURRENTLY LOGGED AS:</span><br>
        <strong style="color: var(--accent);">Eng. Allan (Founder)</strong>
    </div>
</div>

<div class="main">
    <div class="header">
        <div class="welcome-text">
            <h2>Executive Terminal</h2>
            <p id="date-display" style="color: #8892b0; margin-top: 5px;"></p>
        </div>
        <div style="background: white; padding: 10px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
            Status: <span style="color: var(--success); font-weight: bold;">● Active</span>
        </div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-title">🚀 Authorize New Vacancy</div>
            <form id="jobForm">
                <label>Professional Job Title</label>
                <input type="text" name="title" placeholder="e.g., Senior Biomedical Engineer" required>
                
                <label>Job Description & Responsibilities</label>
                <textarea name="description" rows="3" placeholder="Briefly describe the role..."></textarea>

                <label>Interview Assessment Questions</label>
                <textarea name="questions" rows="4" placeholder="Question 1, Question 2, Question 3... (Comma separated)"></textarea>
                
                <label>Documentation Policy</label>
                <select name="attachmentRequired">
                    <option value="No">No Attachments Required</option>
                    <option value="Yes">Require CV Drive Link</option>
                </select>
                
                <button type="submit" id="pBtn" class="btn-primary">Deploy to Portal</button>
            </form>

            <div style="margin-top: 40px;">
                <div class="card-title">📂 Live on Portal</div>
                <div id="activeJobList">Syncing...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">👥 Talent Pipeline</div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Candidate Details</th>
                            <th>Applied Position</th>
                            <th>Executive Action</th>
                        </tr>
                    </thead>
                    <tbody id="applicantList">
                        <tr><td colspan="3" style="text-align:center; padding: 40px; color: #888;">Fetching candidate data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // 1. Post Job
    document.getElementById("jobForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("pBtn");
        btn.innerText = "TRANSMITTING...";
        btn.disabled = true;
        await fetch(API_URL, { method: "POST", body: new FormData(e.target) });
        alert("Authorization Successful. The job is now live.");
        location.reload();
    });

    // 2. Delete Logic
    async function deleteJob(title) {
        if(!confirm(`Permanent Delete: "${title}"?`)) return;
        await fetch(`${API_URL}/title/${title}`, { method: "DELETE" });
        location.reload();
    }

    // 3. Load UI
    async function loadData() {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        // Populate Jobs
        const jobs = data.filter(r => r.title);
        document.getElementById("activeJobList").innerHTML = jobs.map(j => `
            <div class="job-pill">
                <span style="font-weight:600; font-size:0.9rem;">${j.title}</span>
                <span class="delete-icon" onclick="deleteJob('${j.title}')">REMOVE</span>
            </div>
        `).join('');

        // Populate Applicants
        const apps = data.filter(r => r.Jina);
        const list = document.getElementById("applicantList");
        if(apps.length === 0) list.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No applicants yet.</td></tr>";
        else {
            list.innerHTML = apps.map(u => `
                <tr>
                    <td><strong>${u.Jina}</strong><br><small style="color:#8892b0">${u.Email}</small></td>
                    <td><span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:20px; font-size:0.75rem;">${u.Nafasi}</span></td>
                    <td>
                        <button class="btn-circle" style="background:var(--success)" onclick="respond('${u.Email}','${u.Jina}','accept')">✔</button>
                        <button class="btn-circle" style="background:var(--danger)" onclick="respond('${u.Email}','${u.Jina}','reject')">✖</button>
                    </td>
                </tr>
            `).join('');
        }
    }

    // 4. Advanced Email Decisions
    window.respond = (email, name, type) => {
        const tid = type === 'accept' ? "template_3w0v7dr" : "template_rej123";
        if(!confirm(`Proceed with ${type.toUpperCase()} response for ${name}?`)) return;

        emailjs.send("service_69b8y3p", tid, { 
            to_email: email, 
            to_name: name,
            company: "Bionex Company Limited",
            ceo: "Eng. Allan"
        }).then(() => alert("Decision dispatched to candidate."));
    };

    document.getElementById("date-display").innerText = new Date().toDateString();
    loadData();
</script>
</body>
</html>
