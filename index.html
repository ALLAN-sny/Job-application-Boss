<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Bionex</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a237e; color: white; }
        .delete-btn { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .nav-btn { background: #333; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fas fa-users-cog"></i> Admin Dashboard - Maombi ya Kazi</h2>
    <a href="index.html" class="nav-btn">Rudi Nyumbani</a>
</div>

<div class="card">
    <h3 id="statCount">Jumla ya Maombi: 0</h3>
    <table id="appsTable">
        <thead>
            <tr>
                <th>Tarehe</th>
                <th>Jina</th>
                <th>Kazi Aliyoomba</th>
                <th>Mawasiliano</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function loadData() {
        const apps = JSON.parse(localStorage.getItem("bionex_apps")) || [];
        const tbody = document.getElementById("tableBody");
        document.getElementById("statCount").innerText = "Jumla ya Maombi: " + apps.length;
        
        tbody.innerHTML = "";
        apps.sort((a,b) => b.id - a.id).forEach((app, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${app.date}</td>
                    <td><strong>${app.name}</strong></td>
                    <td>${app.job}</td>
                    <td>${app.phone}<br><small>${app.email}</small></td>
                    <td><button class="delete-btn" onclick="deleteApp(${index})">Futa</button></td>
                </tr>
            `;
        });
    }

    function deleteApp(index) {
        if(confirm("Je, una uhakika unataka kufuta ombi hili?")) {
            let apps = JSON.parse(localStorage.getItem("bionex_apps")) || [];
            apps.splice(index, 1);
            localStorage.setItem("bionex_apps", JSON.stringify(apps));
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
