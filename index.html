<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin | Eng. Allan</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--navy); color: var(--gold); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--navy); text-align:center;">Bionex Job Deployer</h2>
    <form id="postForm">
        <label>ID</label><input type="text" id="inID" required>
        <label>TITLE</label><input type="text" id="inTitle" required>
        <label>QUESTIONS</label><textarea id="inQs" placeholder="Q1, Q2, Q3"></textarea>
        <label>REQUIRE CV?</label>
        <select id="inCV"><option value="No">No</option><option value="Yes">Yes</option></select>
        <button type="submit" id="btn" class="btn">PUBLISH NOW</button>
    </form>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    document.getElementById("postForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const b = document.getElementById("btn");
        b.innerText = "Transmitting...";
        b.disabled = true;

        const item = {
            "ID": document.getElementById("inID").value,
            "TITLE": document.getElementById("inTitle").value,
            "QUESTIONS": document.getElementById("inQs").value,
            "REQUIRECV": document.getElementById("inCV").value
        };

        fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"data": [item]})
        })
        .then(res => res.json())
        .then(d => {
            if(d.created) { alert("Job Posted Successfully!"); location.reload(); }
            else { alert("Error: " + JSON.stringify(d)); b.disabled = false; b.innerText = "PUBLISH NOW"; }
        })
        .catch(e => { alert("Check Connection"); b.disabled = false; });
    });
</script>
</body>
</html>
