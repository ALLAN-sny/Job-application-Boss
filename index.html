<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; border-top: 5px solid #ffca28; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0a192f; color: #ffca28; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#0a192f;">BIONEX ADMIN</h2>
        <form action="https://sheetdb.io/api/v1/2x8hezimvlj00" method="POST">
            <label>ID</label><input type="text" name="ID" placeholder="BX01" required>
            <label>Job Title</label><input type="text" name="TITLE" placeholder="Biomedical Engineer" required>
            <label>Questions</label><textarea name="QUESTIONS" placeholder="Experience?, Age?"></textarea>
            <label>CV Required?</label>
            <select name="REQUIRECV"><option value="No">No</option><option value="Yes">Yes</option></select>
            
            <button type="submit">PUBLISH JOB NOW</button>
        </form>
    </div>
</body>
</html>
