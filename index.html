<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bionex Admin Dashboard</title>

<style>
:root { --primary:#1a237e; --bg:#f4f7f9; }
body { margin:0; font-family:sans-serif; background:var(--bg); padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  max-width:500px;
  margin:auto;
}

input, textarea, button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#ffca28;
  color:#1a237e;
  font-weight:bold;
  cursor:pointer;
  border:none;
}

#status {
  text-align:center;
  font-weight:bold;
}
.job {
  background:#eef2ff;
  padding:10px;
  border-radius:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="card">
  <h2 style="text-align:center;color:#1a237e;">Bionex Admin</h2>

  <input type="text" id="jobTitle" placeholder="Job Title">
  <textarea id="jobQuestions" placeholder="Maswali (optional)"></textarea>

  <button id="postBtn">POST JOB</button>

  <div id="status"></div>

  <hr>
  <h3>Posted Jobs:</h3>
  <div id="jobsList">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

// CONFIG YAKO
const firebaseConfig = {
  apiKey: "AIzaSyA5TJQ-nA9TuLsJJ9PXkYv9c0m7Q9_Dw64",
  authDomain: "bionex-job-portal-d9916.firebaseapp.com",
  projectId: "bionex-job-portal-d9916",
  storageBucket: "bionex-job-portal-d9916.appspot.com",
  messagingSenderId: "98574190987",
  appId: "1:98574190987:web:ceed55ea553cb05604478e"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// POST JOB
document.getElementById("postBtn").addEventListener("click", async () => {
  const title = document.getElementById("jobTitle").value.trim();
  const questions = document.getElementById("jobQuestions").value.trim();
  const status = document.getElementById("status");

  if (!title) {
    alert("Weka job title!");
    return;
  }

  status.innerHTML = "Inapost...";

  try {
    await addDoc(collection(db, "jobs"), {
      title: title,
      questions: questions,
      createdAt: new Date()
    });

    status.innerHTML = "✅ Job imepost!";
    document.getElementById("jobTitle").value = "";
    document.getElementById("jobQuestions").value = "";

    loadJobs();

  } catch (error) {
    console.error(error);
    status.innerHTML = "❌ Error: " + error.message;
  }
});

// LOAD JOBS
async function loadJobs() {
  const list = document.getElementById("jobsList");

  try {
    const snapshot = await getDocs(collection(db, "jobs"));
    list.innerHTML = "";

    if (snapshot.empty) {
      list.innerHTML = "Hakuna jobs bado.";
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();
      list.innerHTML += `
        <div class="job">
          <strong>${data.title}</strong><br>
          <small>${data.questions || ""}</small>
        </div>
      `;
    });

  } catch (err) {
    list.innerHTML = "Imeshindwa kusoma data.";
  }
}

// LOAD ON START
loadJobs();

</script>

</body>
</html>
