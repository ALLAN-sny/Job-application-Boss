<!DOCTYPE html>
<html>
<head>
    <title>Bionex Admin | Eng. Allan</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; }
        .card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid #ffca28; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0a192f; color: #ffca28; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#0a192f; text-align:center;">Bionex Job Deployer</h2>
    <form id="pForm">
        <label>ID</label><input type="text" id="i" placeholder="BX001" required>
        <label>Job Title</label><input type="text" id="t" placeholder="Biomedical Engineer" required>
        <label>Questions (comma separated)</label><textarea id="q" placeholder="Experience?, Age?"></textarea>
        <label>Require CV?</label>
        <select id="c"><option value="No">No</option><option value="Yes">Yes</option></select>
        <button type="submit" id="b">AUTHORIZE & PUBLISH</button>
    </form>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    document.getElementById("pForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("b");
        btn.innerText = "Transmitting...";
        btn.disabled = true;

        // NJIA YA UHAKIKA: Kutuma kama Array ya Object moja
        const myData = {
            "ID": document.getElementById("i").value,
            "TITLE": document.getElementById("t").value,
            "QUESTIONS": document.getElementById("q").value,
            "REQUIRECV": document.getElementById("c").value
        };

        fetch(API, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ "data": [myData] }) // Hii ndiyo format pekee SheetDB wanayotaka
        })
        .then(res => res.json())
        .then(resData => {
            if(resData.created || resData.affected_rows > 0) {
                alert("SUCCESS! Job Posted to Bionex Portal.");
                location.reload();
            } else {
                alert("Error: " + JSON.stringify(resData));
                btn.disabled = false;
                btn.innerText = "AUTHORIZE & PUBLISH";
            }
        })
        .catch(err => {
            alert("Connection Failed. Check if Sheet is Public (Editor)");
            btn.disabled = false;
            btn.innerText = "AUTHORIZE & PUBLISH";
        });
    });
</script>
</body>
</html>
