<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bionex Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root { --primary:#1a237e; --success:#2e7d32; --danger:#d32f2f; --bg:#f0f4f8; }
body { margin:0; font-family:'Poppins',sans-serif; background:var(--bg); }
header { background:var(--primary); color:white; padding:30px; text-align:center; }
.container { display:flex; flex-wrap:wrap; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin:10px; flex:1; min-width:300px; }
input, textarea, button { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ddd; box-sizing:border-box; }
button { cursor:pointer; font-weight:bold; }
.btn-post { background:#ffca28; color:#1a237e; }
.btn-accept { background:var(--success); color:white; }
.btn-reject { background:var(--danger); color:white; }
table { width:100%; border-collapse: collapse; }
th, td { border-bottom:1px solid #eee; padding:10px; text-align:left; }
.job-card { background:#e8eaf6; padding:12px; border-radius:8px; margin-bottom:8px; }
.job-card:hover { background:#c5cae9; }
</style>
</head>
<body>
<header>
<h1>Bionex Admin Dashboard</h1>
</header>

<div class="container">
<div class="card">
<h2>Post Job</h2>
<input type="text" id="jobTitle" placeholder="Job Title">
<textarea id="jobQuestions" placeholder="Interview Questions, comma separated"></textarea>
<label><input type="checkbox" id="requireCV"> Require CV</label>
<button class="btn-post" onclick="postJob()">Post Job</button>

<h3>Live Jobs</h3>
<div id="jobsContainerAdmin"></div>
</div>

<div class="card">
<h2>Applications</h2>
<table>
<thead><tr><th>Name</th><th>Job</th><th>CV</th><th>Decision</th></tr></thead>
<tbody id="applicationsTable"></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5TJQ-nA9TuLsJJ9PXkYv9c0m7Q9_Dw64",
  authDomain: "bionex-job-portal-d9916.firebaseapp.com",
  projectId: "bionex-job-portal-d9916",
  storageBucket: "bionex-job-portal-d9916.appspot.com",
  messagingSenderId: "98574190987",
  appId: "1:98574190987:web:ceed55ea553cb05604478e",
  measurementId: "G-9WZ1Y72F38"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const jobsContainerAdmin = document.getElementById("jobsContainerAdmin");
const applicationsTable = document.getElementById("applicationsTable");

async function postJob(){
    const title = document.getElementById("jobTitle").value.trim();
    const questions = document.getElementById("jobQuestions").value.trim();
    const requireCV = document.getElementById("requireCV").checked;
    if(!title) return alert("Enter Job Title");

    await addDoc(collection(db,"jobs"),{title, questions, requireCV, postedAt:new Date()});
    alert("Job Posted!");
    loadJobsAdmin();
    loadApplications();
}

async function loadJobsAdmin(){
    jobsContainerAdmin.innerHTML="";
    const snapshot = await getDocs(collection(db,"jobs"));
    snapshot.forEach(docSnap=>{
        const job=docSnap.data();
        jobsContainerAdmin.innerHTML += `<div class="job-card">${job.title} <button onclick="deleteJob('${docSnap.id}')">Delete</button></div>`;
    });
}
window.deleteJob = async function(jobId){
    if(!confirm("Delete job?")) return;
    await deleteDoc(doc(db,"jobs",jobId));
    loadJobsAdmin();
}

// Applications
async function loadApplications(){
    applicationsTable.innerHTML="";
    const snapshot = await getDocs(collection(db,"applications"));
    snapshot.forEach(docSnap=>{
        const app = docSnap.data();
        applicationsTable.innerHTML+=`
        <tr>
        <td>${app.name}</td>
        <td>${app.jobTitle}</td>
        <td>${app.cvUrl?`<a href="${app.cvUrl}" target="_blank">View CV</a>`:"No CV"}</td>
        <td>
        <button onclick="processDecision('${docSnap.id}','Accepted')" class="btn-accept">Accept</button>
        <button onclick="processDecision('${docSnap.id}','Rejected')" class="btn-reject">Reject</button>
        </td>
        </tr>`;
    });
}
window.processDecision = async function(appId, decision){
    await deleteDoc(doc(db,"applications",appId));
    loadApplications();
}

loadJobsAdmin();
loadApplications();
</script>
</body>
</html>
