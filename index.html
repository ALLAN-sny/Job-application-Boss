<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Eng. Allan</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #ffca28; }
        h2 { color: #0a192f; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #0a192f; color: #ffca28; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="card">
    <h2>BIONEX ADMIN</h2>
    <p style="text-align:center;">Post Job Position</p>
    
    <form action="https://sheetdb.io/api/v1/2x8hezimvlj00" method="POST">
        <label>Job ID</label>
        <input type="text" name="data[ID]" placeholder="BX001" required>

        <label>Job Title</label>
        <input type="text" name="data[TITLE]" placeholder="Biomedical Engineer" required>

        <label>Questions (comma separated)</label>
        <textarea name="data[QUESTIONS]" placeholder="Experience?, Education?"></textarea>

        <label>Require CV?</label>
        <select name="data[REQUIRECV]">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
        </select>

        <input type="hidden" name="data[NAME]" value="">
        <input type="hidden" name="data[EMAIL ADRESS]" value="">
        <input type="hidden" name="data[PHONE NO:]" value="">
        <input type="hidden" name="data[POSITION]" value="">

        <button type="submit">PUBLISH JOB NOW</button>
    </form>
</div>
</body>
</html>
