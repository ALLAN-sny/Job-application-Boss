<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Professional Console</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("v-m77E7p5O_T16kX_"); })();
    </script>

    <style>
        :root { 
            --primary: #0a192f; 
            --accent: #ffca28; 
            --sidebar: #112240;
            --text-light: #ccd6f6;
            --white: #ffffff;
            --success: #64ffda;
        }

        body { 
            margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #f0f4f8; display: flex; min-height: 100vh; 
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px; background: var(--sidebar); color: var(--text-light);
            display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100vh;
        }
        .sidebar h2 { color: var(--accent); letter-spacing: 2px; border-bottom: 1px solid #233554; padding-bottom: 20px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-item:hover { background: #233554; color: var(--accent); }
        .active { background: var(--primary); color: var(--accent); border-left: 4px solid var(--accent); }

        /* Main Content Area */
        .main-content { margin-left: 300px; flex: 1; padding: 40px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--white); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--accent);
        }
        .stat-card h4 { margin: 0; color: #666; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0 0; color: var(--primary); }

        /* Content Sections */
        .grid-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .card { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h3 { color: var(--primary); margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; }

        input, textarea, select {
            width: 100%; padding: 12px; margin: 10px 0 20px 0; border-radius: 8px;
            border: 1px solid #ddd; background: #f9f9f9; font-size: 14px;
        }
        
        .btn-post {
            background: var(--primary); color: var(--accent); border: 2px solid var(--accent);
            padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-post:hover { background: var(--accent); color: var(--primary); }

        /* Modern Table */
        .table-container { background: var(--white); border-radius: 15px; padding: 20px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .badge-job { background: #e6f7ff; color: #1890ff; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-acc { background: #52c41a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-rej { background: #ff4d4f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        .profile-section { margin-top: auto; padding-top: 20px; border-top: 1px solid #233554; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>BIONEX</h2>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item">Active Vacancies</div>
        <div class="nav-item">Talent Pool</div>
        <div class="nav-item">Settings</div>

        <div class="profile-section">
            <small style="color: var(--accent);">Logged in as:</small><br>
            <strong>Eng. Allan</strong><br>
            <small>Founder & CEO</small>
        </div>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary);">Executive Overview</h1>
            <div id="liveClock" style="font-weight: bold; color: var(--sidebar);"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h4>Live Jobs</h4><h2 id="jobCount">0</h2></div>
            <div class="stat-card"><h4>Total Applicants</h4><h2 id="appCount">0</h2></div>
            <div class="stat-card"><h4>System Status</h4><h2 style="color: var(--success); font-size: 1rem;">● ONLINE</h2></div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h3>Create New Vacancy</h3>
                <label>Job Designation</label>
                <input type="text" id="jobTitle" placeholder="e.g. Biomedical Service Engineer">
                
                <label>Technical Interview Questions</label>
                <textarea id="jobQuestions" rows="4" placeholder="Question 1, Question 2..."></textarea>
                
                <label>Compliance Check</label>
                <select id="attachmentReq">
                    <option value="No">No Documentation Required</option>
                    <option value="Yes">Full CV & Certificates (Required)</option>
                </select>
                
                <button id="postBtn" class="btn-post">AUTHORIZE & PUBLISH</button>
            </div>

            <div class="card">
                <h3>Candidate Pipeline</h3>
                <div style="overflow-x: auto;">
                    <table id="applicantsTable">
                        <thead>
                            <tr>
                                <th>Candidate</th>
                                <th>Position</th>
                                <th>Management</th>
                            </tr>
                        </thead>
                        <tbody id="applicantList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5TJQ-nA9TuLsJJ9PXkYv9c0m7Q9_Dw64",
            authDomain: "bionex-job-portal-d9916.firebaseapp.com",
            projectId: "bionex-job-portal-d9916",
            storageBucket: "bionex-job-portal-d9916.appspot.com",
            messagingSenderId: "98574190987",
            appId: "1:98574190987:web:ceed55ea553cb05604478e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const SHEETDB_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

        // POST JOB
        document.getElementById("postBtn").addEventListener("click", async () => {
            const title = document.getElementById("jobTitle").value;
            const questions = document.getElementById("jobQuestions").value;
            const attach = document.getElementById("attachmentReq").value;
            if(!title) return alert("Designation is required");

            try {
                await addDoc(collection(db, "jobs"), { title, questions, attachmentRequired: attach, timestamp: new Date() });
                alert("New Vacancy Authorized Successfully!");
                location.reload();
            } catch (e) { alert("Authorization Failed"); }
        });

        // LOAD APPLICANTS & STATS
        async function loadDashboard() {
            // Load Jobs for Stats
            const jobSnap = await getDocs(collection(db, "jobs"));
            document.getElementById("jobCount").innerText = jobSnap.size;

            // Load Applicants from SheetDB
            try {
                const res = await fetch(SHEETDB_URL);
                const data = await res.json();
                document.getElementById("appCount").innerText = data.length;

                const list = document.getElementById("applicantList");
                list.innerHTML = "";
                data.forEach(user => {
                    list.innerHTML += `
                        <tr>
                            <td>
                                <strong>${user.Jina}</strong><br>
                                <small style="color:#888;">${user.Email}</small>
                            </td>
                            <td><span class="badge-job">${user.Nafasi}</span></td>
                            <td>
                                <button class="btn-acc" onclick="respond('${user.Email}', '${user.Jina}', 'accept')">✔</button>
                                <button class="btn-rej" onclick="respond('${user.Email}', '${user.Jina}', 'reject')">✖</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) { console.log("Error loading applicants"); }
        }

        window.respond = function(email, name, type) {
            const templateID = (type === 'accept') ? "template_3w0v7dr" : "template_rej123";
            if(!confirm(`Issue ${type} letter to ${name}?`)) return;
            emailjs.send("service_69b8y3p", templateID, { to_email: email, to_name: name })
                .then(() => alert("Official Response Dispatched!")).catch(() => alert("Dispatch Failed"));
        };

        // Clock Update
        setInterval(() => {
            document.getElementById("liveClock").innerText = new Date().toLocaleTimeString();
        }, 1000);

        loadDashboard();
    </script>
</body>
</html>
