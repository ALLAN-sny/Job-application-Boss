<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f7; display: flex; }
        .sidebar { width: 300px; background: #1a237e; color: white; padding: 20px; height: 100vh; position: fixed; }
        .main { margin-left: 340px; padding: 20px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-post { background: #2e7d32; color: white; }
        .btn-accept { background: #2e7d32; color: white; margin-right: 5px; }
        .btn-reject { background: #c62828; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Post New Job</h2>
    <input type="text" id="jobTitle" placeholder="Job Title (e.g. Lab Tech)">
    <textarea id="jobQuestions" placeholder="Interview Questions (Separate by comma)"></textarea>
    <label><input type="checkbox" id="requireCV"> Require CV Attachment?</label>
    <br><br>
    <button class="btn-post" onclick="postJob()">Post Vacancy</button>
</div>

<div class="main">
    <h1>Bionex Admin Panel</h1>
    
    <div class="card">
        <h3>Recent Applications</h3>
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Job</th>
                    <th>Interview Answers</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTable"></tbody>
        </table>
    </div>
</div>

<script>
    emailjs.init("YOUR_USER_ID"); // Replace with your EmailJS Public Key

    function postJob() {
        const title = document.getElementById("jobTitle").value;
        const questions = document.getElementById("jobQuestions").value;
        const cv = document.getElementById("requireCV").checked;

        if(!title) return alert("Enter job title");

        const newJob = { title, questions, attachmentRequired: cv };
        let jobs = JSON.parse(localStorage.getItem("bionex_posted_jobs")) || [];
        jobs.push(newJob);
        localStorage.setItem("bionex_posted_jobs", JSON.stringify(jobs));
        alert("Job Posted!");
        location.reload();
    }

    function loadApps() {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions")) || [];
        const tbody = document.getElementById("appTable");
        tbody.innerHTML = "";

        apps.forEach((app, index) => {
            let answersHtml = app.answers.map(a => `<b>Q:</b> ${a.question}<br><b>A:</b> ${a.answer}`).join('<br><hr>');
            
            tbody.innerHTML += `
                <tr>
                    <td>${app.name}<br><small>${app.email}</small></td>
                    <td>${app.jobTitle}</td>
                    <td><div style="font-size: 0.8em; max-height: 100px; overflow: auto;">${answersHtml}</div></td>
                    <td>
                        <button class="btn-accept" onclick="respond(${index}, 'Accepted')">Accept</button>
                        <button class="btn-reject" onclick="respond(${index}, 'Rejected')">Reject</button>
                    </td>
                </tr>`;
        });
    }

    function respond(index, status) {
        let apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const person = apps[index];

        // Send Email via EmailJS
        emailjs.send("service_id", "template_id", {
            to_name: person.name,
            to_email: person.email,
            status: status,
            message: status === "Accepted" ? 
                "Congratulations! You have been selected for the next stage." : 
                "We regret to inform you that your application was not successful."
        }).then(() => {
            alert(`Email sent: ${person.name} has been ${status}`);
            apps.splice(index, 1); // Remove from list after action
            localStorage.setItem("bionex_submissions", JSON.stringify(apps));
            loadApps();
        });
    }

    loadApps();
</script>
</body>
</html>
