<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Executive Terminal</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; --slate: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--slate); margin: 0; display: flex; }
        .sidebar { width: 280px; background: var(--navy); color: white; height: 100vh; position: fixed; padding: 30px; box-sizing: border-box; border-right: 5px solid var(--gold); }
        .main-content { margin-left: 280px; padding: 50px; width: 100%; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 600px; }
        h2 { color: var(--navy); margin-top: 0; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        label { display: block; margin-top: 20px; font-weight: bold; color: #64748b; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 15px; margin-top: 8px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fcfcfc; }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-publish { background: var(--navy); color: var(--gold); border: 2px solid var(--gold); padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; transition: 0.3s; }
        .btn-publish:hover { background: var(--gold); color: var(--navy); }
        .status-tag { display: inline-block; padding: 5px 12px; background: #dcfce7; color: #166534; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="color: var(--gold); letter-spacing: 2px;">BIONEX</h1>
    <p style="opacity: 0.7;">Executive Management</p>
    <div style="margin-top: 50px;">
        <p>System Admin:</p>
        <h3 style="margin: 0;">Eng. Allan</h3>
        <p style="margin-top: 20px;"><span class="status-tag">● SERVER ONLINE</span></p>
    </div>
</div>

<div class="main-content">
    <div class="card">
        <h2>Deploy New Vacancy</h2>
        <p style="color: #94a3b8;">Jaza maelezo hapa chini ili kazi ionekane kwenye portal ya waombaji.</p>
        
        <form id="postJobForm">
            <label>JOB ID (Example: BX-01)</label>
            <input type="text" id="jobID" placeholder="BX-001" required>
            
            <label>JOB TITLE (Position Name)</label>
            <input type="text" id="jobTitle" placeholder="Biomedical Engineer" required>
            
            <label>ASSESSMENT QUESTIONS (Tenganisha kwa mkato , )</label>
            <textarea id="jobQs" rows="3" placeholder="Experience?, Education?, Why Bionex?"></textarea>
            
            <label>REQUIRE CV UPLOAD?</label>
            <select id="jobCV">
                <option value="No">No (Text Responses Only)</option>
                <option value="Yes">Yes (Require Google Drive Link)</option>
            </select>
            
            <button type="submit" id="submitBtn" class="btn-publish">AUTHORIZE & PUBLISH</button>
        </form>
    </div>
</div>

<script>
    const SHEETDB_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    document.getElementById("postJobForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        
        btn.innerText = "TRANSMITTING DATA...";
        btn.disabled = true;

        const dataPayload = {
            "data": [{
                "ID": document.getElementById("jobID").value,
                "TITLE": document.getElementById("jobTitle").value,
                "QUESTIONS": document.getElementById("jobQs").value,
                "REQUIRECV": document.getElementById("jobCV").value
            }]
        };

        fetch(SHEETDB_URL, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dataPayload)
        })
        .then(response => response.json())
        .then(result => {
            if(result.created) {
                alert("SUCCESS: Job has been deployed to the Careers Portal!");
                location.reload();
            } else {
                alert("Error: " + JSON.stringify(result));
                btn.disabled = false;
                btn.innerText = "AUTHORIZE & PUBLISH";
            }
        })
        .catch(error => {
            alert("Network Error: Check your connection or API link.");
            btn.disabled = false;
            btn.innerText = "AUTHORIZE & PUBLISH";
        });
    });
</script>
</body>
</html>
