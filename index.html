<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Admin | Eng. Allan</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffca28; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; background: var(--navy); color: white; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; border-right: 5px solid var(--gold); }
        .main { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--navy); color: var(--gold); border: 2px solid var(--gold); padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 1.1rem; }
        .status-box { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--gold)">BIONEX</h2>
    <p>CEO: <strong>Eng. Allan</strong></p>
    <hr style="opacity:0.3">
    <p>System: <span id="syncStatus">Syncing...</span></p>
</div>

<div class="main">
    <div id="msg" class="status-box"></div>
    <div class="card">
        <h2 style="color:var(--navy); margin-top:0;">Deploy New Job Position</h2>
        <form id="adminForm">
            <label>JOB ID</label>
            <input type="text" id="jobID" placeholder="e.g. BX001" required>
            
            <label>JOB TITLE</label>
            <input type="text" id="jobTitle" placeholder="e.g. Biomedical Engineer" required>
            
            <label>QUESTIONS (Tenganisha kwa mkato , )</label>
            <textarea id="jobQs" placeholder="Experience?, Education?"></textarea>
            
            <label>REQUIRE CV LINK?</label>
            <select id="jobCV">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
            
            <button type="submit" id="pBtn" class="btn">PUBLISH TO PORTAL</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    // 1. KULAZIMISHA MFUMO USOME SHEET MPYA (Force Reload on Load)
    window.onload = async function() {
        const statusText = document.getElementById("syncStatus");
        try {
            const res = await fetch(API_URL + "/reload");
            if(res.ok) {
                statusText.innerText = "Connected & Synced";
                statusText.style.color = "#10b981";
                console.log("SheetDB Synced Successfully");
            }
        } catch (e) {
            statusText.innerText = "Sync Failed";
            statusText.style.color = "#ef4444";
        }
    };

    // 2. KUTUMA DATA KWENYE SHEET
    document.getElementById("adminForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("pBtn");
        const msgBox = document.getElementById("msg");
        
        btn.innerText = "Transmitting...";
        btn.disabled = true;

        const payload = {
            "data": [{
                "ID": document.getElementById("jobID").value,
                "TITLE": document.getElementById("jobTitle").value,
                "QUESTIONS": document.getElementById("jobQs").value,
                "REQUIRECV": document.getElementById("jobCV").value
            }]
        };

        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.created) {
                alert("SUCCESS: Job is now live!");
                location.reload();
            } else {
                alert("Error: " + JSON.stringify(data));
                btn.disabled = false;
                btn.innerText = "PUBLISH TO PORTAL";
            }
        })
        .catch(error => {
            alert("Network Error. Hakikisha Sheet yako ipo 'Anyone with the link can EDIT'");
            btn.disabled = false;
            btn.innerText = "PUBLISH TO PORTAL";
        });
    });
</script>
</body>
</html>
