<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin | Management</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #303f9f; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; display: flex; }
        
        /* Sidebar Styles */
        .sidebar { width: 320px; background: var(--primary); color: white; padding: 25px; height: 100vh; position: fixed; box-sizing: border-box; box-shadow: 4px 0 10px rgba(0,0,0,0.2); }
        .sidebar h2 { font-size: 1.5rem; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Main Content Styles */
        .main { margin-left: 320px; padding: 40px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* Form Elements */
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-post { background: #ffca28; color: #1a237e; width: 100%; margin-top: 20px; }
        .btn-post:hover { background: #ffd54f; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; padding: 15px; color: #555; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: top; }
        
        .ans-preview { font-size: 0.85rem; color: #444; background: #f9f9f9; padding: 10px; border-radius: 6px; border-left: 4px solid var(--secondary); line-height: 1.4; }
        .btn-acc { background: var(--success); color: white; margin-right: 5px; font-size: 0.8rem; }
        .btn-rej { background: var(--danger); color: white; font-size: 0.8rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Post Job Vacancy</h2>
    
    <label>Job Designation</label>
    <input type="text" id="jobTitle" placeholder="e.g. Biomedical Engineer">
    
    <label>Interview Questions</label>
    <textarea id="jobQuestions" rows="5" placeholder="Q1, Q2, Q3... (comma separated)"></textarea>
    
    <label style="cursor:pointer; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="requireCV" style="width:auto;"> CV Attachment Required?
    </label>
    
    <button class="btn btn-post" onclick="postJob()">Broadcast Job</button>
</div>

<div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h1 style="margin:0; color:var(--primary);">Applicant Review Board</h1>
        <button class="btn" style="background:#eee;" onclick="location.href='index.html'">View Portal</button>
    </div>
    
    <div class="card">
        <h3 id="countLabel">Loading applications...</h3>
        <table>
            <thead>
                <tr>
                    <th>Applicant Info</th>
                    <th>Job Title</th>
                    <th>Interview Response</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Initialize EmailJS with your Public Key
    emailjs.init("gCwHsyNsD024VEWx7");

    function postJob() {
        const title = document.getElementById("jobTitle").value.trim();
        const questions = document.getElementById("jobQuestions").value.trim();
        const cv = document.getElementById("requireCV").checked;

        if(!title) return alert("Please specify the Job Title.");

        const jobObj = { title, questions, attachmentRequired: cv };
        let jobsList = JSON.parse(localStorage.getItem("bionex_posted_jobs")) || [];
        jobsList.push(jobObj);
        localStorage.setItem("bionex_posted_jobs", JSON.stringify(jobsList));
        
        alert("Success! The job is now live.");
        location.reload();
    }

    function renderApps() {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions")) || [];
        const tableBody = document.getElementById("appTable");
        document.getElementById("countLabel").innerText = `Active Applications (${apps.length})`;
        
        tableBody.innerHTML = apps.length === 0 
            ? `<tr><td colspan="4" style="text-align:center; padding:40px; color:#999;">No applicants yet.</td></tr>` 
            : "";

        apps.forEach((app, idx) => {
            let responses = app.answers.map(a => `• <b>${a.question}</b>: ${a.answer}`).join('<br>');
            
            tableBody.innerHTML += `
                <tr>
                    <td>
                        <b>${app.name}</b><br>
                        <small>Age: ${app.age} | ${app.phone}</small><br>
                        <i style="font-size:0.8rem; color:#666;">${app.email}</i>
                    </td>
                    <td><span style="color:var(--primary); font-weight:600;">${app.jobTitle}</span></td>
                    <td><div class="ans-preview">${responses || "No specific questions answered."}</div></td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-acc" onclick="processDecision(${idx}, 'Accepted')">Accept</button>
                        <button class="btn btn-rej" onclick="processDecision(${idx}, 'Rejected')">Reject</button>
                    </td>
                </tr>`;
        });
    }

    async function processDecision(index, decision) {
        let apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const target = apps[index];
        const btnClicked = event.target;
        
        btnClicked.innerText = "Processing...";
        btnClicked.disabled = true;

        // Custom English Message for the Applicant
        const customMessage = decision === "Accepted" 
            ? `We are pleased to inform you that your application for the ${target.jobTitle} position has been accepted. Our team will reach out to you shortly for the next steps in the recruitment process.`
            : `Thank you for your interest in the ${target.jobTitle} position. After careful review, we regret to inform you that we will not be moving forward with your application at this time. We wish you the best in your future endeavors.`;

        try {
            await emailjs.send("service_b11zlym", "template_j9v1gyq", {
                to_name: target.name,
                to_email: target.email,
                message: customMessage,
                job_title: target.jobTitle,
                status: decision
            });

            alert(`Notification sent! Applicant has been ${decision}.`);
        } catch (err) {
            console.error("EmailJS Error:", err);
            alert("Application processed, but email notification failed. Please check your EmailJS quotas.");
        } finally {
            // Remove applicant from dashboard
            apps.splice(index, 1);
            localStorage.setItem("bionex_submissions", JSON.stringify(apps));
            renderApps();
        }
    }

    renderApps();
</script>
</body>
</html>
