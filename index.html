<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin | Boss Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; }
        .sidebar { width: 320px; background: var(--primary); color: white; padding: 25px; height: 100vh; position: fixed; box-sizing: border-box; overflow-y: auto; }
        .main { margin-left: 320px; padding: 30px; width: calc(100% - 320px); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-post { background: #ffca28; color: #1a237e; width: 100%; }
        .btn-view { background: #0288d1; color: white; margin-top: 10px; display: inline-block; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .ans-preview { font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 5px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Broadcast Job</h2>
    <input type="text" id="jobTitle" placeholder="Job Title">
    <textarea id="jobQuestions" rows="4" placeholder="Interview Questions (comma separated)"></textarea>
    <label><input type="checkbox" id="requireCV"> Require Attachment</label>
    <button class="btn btn-post" onclick="postJob()">BROADCAST NOW</button>
    <hr style="margin:20px 0; opacity:0.2;">
    <h3>Active Jobs</h3>
    <div id="activeJobsList"></div>
</div>

<div class="main">
    <h1 style="color:var(--primary);">Bionex Applicant Review Board</h1>
    <div class="card">
        <h3 id="appCount">Active Applications (0)</h3>
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Job</th>
                    <th>Responses & CV</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="appTable"></tbody>
        </table>
    </div>
</div>

<script>
    emailjs.init("gCwHsyNsD024VEWx7");

    function postJob() {
        const title = document.getElementById("jobTitle").value;
        const questions = document.getElementById("jobQuestions").value;
        const cv = document.getElementById("requireCV").checked;
        if(!title) return alert("Enter title");
        let jobs = JSON.parse(localStorage.getItem("bionex_posted_jobs")) || [];
        jobs.push({ title, questions, attachmentRequired: cv });
        localStorage.setItem("bionex_posted_jobs", JSON.stringify(jobs));
        location.reload();
    }

    function renderApps() {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions")) || [];
        const tbody = document.getElementById("appTable");
        document.getElementById("appCount").innerText = `Active Applications (${apps.length})`;
        tbody.innerHTML = "";

        apps.forEach((app, idx) => {
            let responses = app.answers.map(a => `<b>Q:</b> ${a.question}<br><b>A:</b> ${a.answer}`).join('<br><hr>');
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${app.name}</strong><br><small>${app.email}</small></td>
                    <td><b>${app.jobTitle}</b></td>
                    <td>
                        <div class="ans-preview">${responses || "No answers."}</div>
                        ${app.attachment ? `<button class="btn-view" onclick="openCV('${idx}')">📄 View Uploaded CV</button>` : "<br><small>No attachment</small>"}
                    </td>
                    <td>
                        <button class="btn" style="background:var(--success); color:white;" onclick="process(${idx}, 'Accepted', this)">Accept</button>
                        <button class="btn" style="background:var(--danger); color:white; margin-top:5px;" onclick="process(${idx}, 'Rejected', this)">Reject</button>
                    </td>
                </tr>`;
        });
    }

    function openCV(index) {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const data = apps[index].attachment;
        if(!data) return alert("No file found.");
        
        const newWindow = window.open();
        newWindow.document.write(`<iframe src="${data}" frameborder="0" style="width:100%; height:100vh;"></iframe>`);
    }

    async function process(index, decision, btn) {
        let apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const target = apps[index];
        
        const originalText = btn.innerText;
        btn.innerText = "Processing...";
        btn.disabled = true;

        const msg = decision === "Accepted" 
            ? `Dear ${target.name}, Congratulations! Your application for ${target.jobTitle} was successful.` 
            : `Dear ${target.name}, we regret to inform you that your application was unsuccessful.`;

        try {
            await emailjs.send("service_b11zlym", "template_j9v1gyq", {
                to_name: target.name,
                to_email: target.email,
                message: msg,
                job_title: target.jobTitle,
                status: decision
            });
            alert(`Notification sent! Applicant ${decision}.`);
        } catch (e) {
            alert("Email failed to send, but record will be cleared.");
        }

        apps.splice(index, 1);
        localStorage.setItem("bionex_submissions", JSON.stringify(apps));
        renderApps();
    }

    renderApps();
</script>
</body>
</html>
