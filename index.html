<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin | Job Management</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; }
        
        /* Sidebar kwa ajili ya Kazi (Jobs) */
        .sidebar { width: 340px; background: var(--primary); color: white; padding: 25px; height: 100vh; position: fixed; box-sizing: border-box; overflow-y: auto; }
        .sidebar h2 { border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Sehemu ya Orodha ya Kazi kwenye Sidebar */
        .job-card-mini { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #ffca28; }
        .job-card-mini span { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .btn-delete-job { background: #ff5252; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-delete-job:hover { background: #ff1744; }

        /* Main Content */
        .main { margin-left: 340px; padding: 30px; width: calc(100% - 340px); box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-post { background: #ffca28; color: #1a237e; width: 100%; margin-bottom: 20px; }
        .btn-view { background: #0288d1; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-block; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .ans-preview { font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 5px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Broadcast Job</h2>
    <input type="text" id="jobTitle" placeholder="Job Title (e.g. Biomedical Engineer)">
    <textarea id="jobQuestions" rows="3" placeholder="Interview Questions (comma separated)"></textarea>
    <label><input type="checkbox" id="requireCV"> Require Attachment</label>
    <button class="btn btn-post" onclick="postJob()">BROADCAST NOW</button>

    <div style="margin-top: 30px;">
        <h3 style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">Live Job Postings</h3>
        <div id="activeJobsContainer">
            </div>
    </div>
</div>

<div class="main">
    <h1 style="color:var(--primary);">Bionex Applicant Review Board</h1>
    
    <div class="card">
        <h3 id="appCount">Active Applications (0)</h3>
        <table>
            <thead>
                <tr>
                    <th>Applicant Details</th>
                    <th>Position</th>
                    <th>Response & CV</th>
                    <th>Decision</th>
                </tr>
            </thead>
            <tbody id="appTable"></tbody>
        </table>
    </div>
</div>

<script>
    emailjs.init("gCwHsyNsD024VEWx7");

    // --- 1. Kazi za Broadcast (Jobs) ---
    function postJob() {
        const title = document.getElementById("jobTitle").value.trim();
        const questions = document.getElementById("jobQuestions").value.trim();
        const cv = document.getElementById("requireCV").checked;

        if(!title) return alert("Please enter a Job Title");

        const newJob = { id: Date.now(), title, questions, attachmentRequired: cv };
        let jobs = JSON.parse(localStorage.getItem("bionex_posted_jobs")) || [];
        jobs.push(newJob);
        localStorage.setItem("bionex_posted_jobs", JSON.stringify(jobs));
        
        alert("Job Posted Successfully!");
        location.reload();
    }

    function renderJobs() {
        const jobs = JSON.parse(localStorage.getItem("bionex_posted_jobs")) || [];
        const container = document.getElementById("activeJobsContainer");
        container.innerHTML = jobs.length === 0 ? "<p style='font-size:0.8rem; opacity:0.6;'>No active jobs.</p>" : "";

        jobs.forEach((job, index) => {
            container.innerHTML += `
                <div class="job-card-mini">
                    <span>${job.title}</span>
                    <button class="btn-delete-job" onclick="deleteJob(${index})">Delete Post</button>
                </div>`;
        });
    }

    function deleteJob(index) {
        if(confirm("Are you sure you want to delete this job post? It will disappear for applicants.")) {
            let jobs = JSON.parse(localStorage.getItem("bionex_posted_jobs"));
            jobs.splice(index, 1);
            localStorage.setItem("bionex_posted_jobs", JSON.stringify(jobs));
            renderJobs();
            alert("Job post removed.");
        }
    }

    // --- 2. Kazi za Waombaji (Applicants) ---
    function renderApps() {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions")) || [];
        const tbody = document.getElementById("appTable");
        document.getElementById("appCount").innerText = `Active Applications (${apps.length})`;
        tbody.innerHTML = "";

        apps.forEach((app, idx) => {
            let responses = app.answers.map(a => `<b>Q:</b> ${a.question}<br><b>A:</b> ${a.answer}`).join('<br><hr>');
            
            tbody.innerHTML += `
                <tr>
                    <td>
                        <strong>${app.name}</strong><br>
                        <small>${app.email}</small><br>
                        <small>Age: ${app.age}</small>
                    </td>
                    <td><b>${app.jobTitle}</b></td>
                    <td>
                        <div class="ans-preview">${responses || "No answers."}</div>
                        ${app.attachment ? `<button class="btn-view" onclick="openCV('${idx}')">📄 View Attachment</button>` : "<br><small>No file</small>"}
                    </td>
                    <td>
                        <button class="btn" style="background:var(--success); color:white; width:100%; margin-bottom:5px;" onclick="processDecision(${idx}, 'Accepted', this)">Accept</button>
                        <button class="btn" style="background:var(--danger); color:white; width:100%;" onclick="processDecision(${idx}, 'Rejected', this)">Reject</button>
                    </td>
                </tr>`;
        });
    }

    function openCV(index) {
        const apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const data = apps[index].attachment;
        const newWindow = window.open();
        newWindow.document.write(`<iframe src="${data}" frameborder="0" style="width:100%; height:100vh;"></iframe>`);
    }

    async function processDecision(index, decision, btn) {
        let apps = JSON.parse(localStorage.getItem("bionex_submissions"));
        const target = apps[index];
        
        btn.innerText = "Processing...";
        btn.disabled = true;

        const msg = decision === "Accepted" 
            ? `Dear ${target.name}, Congratulations! Your application for ${target.jobTitle} at Bionex was successful.` 
            : `Dear ${target.name}, we regret to inform you that your application for ${target.jobTitle} was not successful.`;

        try {
            await emailjs.send("service_b11zlym", "template_j9v1gyq", {
                to_name: target.name,
                to_email: target.email,
                message: msg,
                job_title: target.jobTitle,
                status: decision
            });
            alert(`Email sent! Applicant ${decision}.`);
        } catch (e) {
            alert("Application processed, but email notification failed.");
        }

        apps.splice(index, 1);
        localStorage.setItem("bionex_submissions", JSON.stringify(apps));
        renderApps();
    }

    renderJobs();
    renderApps();
</script>
</body>
</html>
