<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bionex Admin | Eng. Allan</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 50px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; border-top: 5px solid #ffca28; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0a192f; color: #ffca28; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>Post New Job</h2>
    <form id="jForm">
        <input type="text" name="ID" placeholder="Job ID (BX01)" required>
        <input type="text" name="TITLE" placeholder="Job Title" required>
        <textarea name="QUESTIONS" placeholder="Questions (comma separated)"></textarea>
        <select name="REQUIRECV">
            <option value="No">No CV</option>
            <option value="Yes">Yes CV</option>
        </select>
        <button type="submit" id="b">PUBLISH JOB</button>
    </form>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/2x8hezimvlj00";

    document.getElementById("jForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("b");
        btn.innerText = "Transmitting...";
        
        // Njia rahisi ya kutuma data bila JSON Error
        fetch(API, {
            method: 'POST',
            body: new FormData(this)
        })
        .then(res => res.json())
        .then(data => {
            if(data.created) {
                alert("Job Posted Successfully!");
                location.reload();
            } else {
                alert("Failed: Check if your Sheet headers match.");
                btn.innerText = "PUBLISH JOB";
            }
        })
        .catch(err => alert("Error: Connection Failed"));
    });
</script>
</body>
</html>
